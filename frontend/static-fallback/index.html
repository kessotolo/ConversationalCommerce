<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversational Commerce</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      line-height: 1.6;
      color: #333;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    .container {
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      padding: 30px;
      margin-top: 50px;
    }
    h1 {
      color: #2563eb;
      margin-bottom: 20px;
    }
    .status {
      background-color: #f3f4f6;
      border-left: 4px solid #2563eb;
      padding: 15px;
      margin: 20px 0;
    }
    .btn {
      display: inline-block;
      background-color: #2563eb;
      color: white;
      padding: 10px 20px;
      border-radius: 4px;
      text-decoration: none;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Conversational Commerce Platform</h1>
    
    <div class="status">
      <h2>Maintenance Mode</h2>
      <p>Our site is currently undergoing maintenance and updates. We'll be back shortly with improved features and performance.</p>
    </div>
    
    <p>During this time, you can still reach out to our support team if you have any questions or concerns.</p>
    
    <a href="mailto:support@example.com" class="btn">Contact Support</a>
  </div>
</body>
</html>
