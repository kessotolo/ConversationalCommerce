[build]
  command = "npm install --save-dev eslint && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "18"
  NPM_FLAGS = "--legacy-peer-deps"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Remove the redirect rule that conflicts with Next.js routing
# Next.js routing is handled by the @netlify/plugin-nextjs plugin
